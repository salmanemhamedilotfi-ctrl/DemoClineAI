<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chat Room – STOMP WebSocket</title>
  <!-- SockJS + STOMP via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    .back { align-self: flex-start; color: #38bdf8; text-decoration: none; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .subtitle { color: #64748b; margin-bottom: 2rem; font-size: 0.9rem; }
    .container { width: 100%; max-width: 700px; }
    .join-form { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1rem; display: flex; gap: 0.5rem; }
    .chat-box { background: #0d1b2e; border: 1px solid #1e3a5f; border-radius: 0.75rem; padding: 1rem; height: 360px; overflow-y: auto; margin-bottom: 1rem; }
    .msg { margin-bottom: 0.6rem; line-height: 1.5; }
    .msg .sender { font-weight: 700; color: #38bdf8; margin-right: 0.4rem; }
    .msg.join, .msg.leave { color: #64748b; font-style: italic; font-size: 0.85rem; }
    .msg.own .sender { color: #a78bfa; }
    .controls { display: flex; gap: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.65rem 1rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; color: #e2e8f0; font-size: 0.95rem; outline: none; }
    input[type=text]:focus { border-color: #38bdf8; }
    button { padding: 0.65rem 1.2rem; border: none; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn-join { background: #22c55e; color: #fff; white-space: nowrap; }
    .btn-send { background: linear-gradient(135deg, #38bdf8, #818cf8); color: #0f172a; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>
  <a class="back" href="/websocket">← Back to examples</a>
  <h1>Chat Room</h1>
  <p class="subtitle">STOMP over SockJS — open multiple tabs to chat</p>

  <div class="container">
    <div class="join-form">
      <input type="text" id="usernameInput" placeholder="Your username…" onkeydown="if(event.key==='Enter') joinChat()"/>
      <button class="btn-join" id="btnJoin" onclick="joinChat()">Join</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="controls">
      <input type="text" id="msgInput" placeholder="Type a message…" disabled onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <script>
    let stompClient = null;
    let username = null;

    function joinChat() {
      const input = document.getElementById('usernameInput');
      username = input.value.trim();
      if (!username) { input.focus(); return; }

      document.getElementById('usernameInput').disabled = true;
      document.getElementById('btnJoin').disabled = true;

      stompClient = new StompJs.Client({
        webSocketFactory: () => new SockJS('/ws-stomp'),
        reconnectDelay: 5000,
        onConnect: () => {
          stompClient.subscribe('/topic/chat', frame => {
            const msg = JSON.parse(frame.body);
            appendMessage(msg);
          });
          stompClient.publish({
            destination: '/app/chat.join',
            body: JSON.stringify({ type: 'JOIN', sender: username, content: '' })
          });
          document.getElementById('msgInput').disabled = false;
          document.getElementById('btnSend').disabled = false;
          document.getElementById('msgInput').focus();
        }
      });
      stompClient.activate();
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content || !stompClient) return;
      stompClient.publish({
        destination: '/app/chat.send',
        body: JSON.stringify({ type: 'CHAT', sender: username, content })
      });
      input.value = '';
    }

    function appendMessage(msg) {
      const box = document.getElementById('chatBox');
      const el = document.createElement('div');
      if (msg.type === 'JOIN' || msg.type === 'LEAVE') {
        el.className = 'msg ' + msg.type.toLowerCase();
        el.textContent = msg.content;
      } else {
        el.className = 'msg' + (msg.sender === username ? ' own' : '');
        el.innerHTML = '<span class="sender">' + escHtml(msg.sender) + '</span>' + escHtml(msg.content);
      }
      box.appendChild(el);
      box.scrollTop = box.scrollHeight;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
